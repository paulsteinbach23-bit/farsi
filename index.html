<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#5B52C2" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1E1D1B" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json?v=2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="تعارف" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />

  <title>تعارف app — Farsi lernen</title>
  <link rel="stylesheet" href="css/style.css?v=4" />
  <script>
    (function() {
      const t = localStorage.getItem('farsi_theme');
      if (t === 'dark')  document.documentElement.classList.add('theme-dark');
      if (t === 'light') document.documentElement.classList.add('theme-light');
    })();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo" lang="und">
      <span class="logo-mark" dir="rtl" lang="fa">تعارف</span>
      <span class="logo-dot" aria-hidden="true">·</span>
      <span class="logo-suffix" lang="en">app</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button type="button" id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" title="Dark/Light Mode" aria-label="Hell- und Dunkelmodus wechseln"></button>
      <div class="streak-badge" id="streak-badge">
        <span class="streak-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span>
        <span id="streak-count">0</span>
      </div>
    </div>
  </div>
</header>

<!-- GLOBE BUTTON -->
<button type="button" class="globe-btn" id="globe-btn" onclick="openLangScreen()" style="display:none" aria-label="Sprache wählen"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button>

<!-- LANGUAGE SELECTION SCREEN -->
<div class="lang-screen" id="lang-screen">
  <div class="lang-screen-header">
    <button class="lang-screen-back" onclick="closeLangScreen()">✕</button>
    <span class="lang-screen-title">Sprache wählen</span>
    <div style="width:44px"></div>
  </div>
  <div class="lang-screen-body">
    <button class="lang-card" id="lang-card-farsi" onclick="selectLang('farsi')">
      <span class="lang-card-flag">🇮🇷</span>
      <div class="lang-card-info">
        <span class="lang-card-name">Farsi</span>
        <span class="lang-card-sub">Persisch · 1000 Wörter</span>
      </div>
      <span class="lang-card-check">✓</span>
    </button>
    <button class="lang-card" id="lang-card-french" onclick="selectLang('french')">
      <span class="lang-card-flag">🇫🇷</span>
      <div class="lang-card-info">
        <span class="lang-card-name">Français</span>
        <span class="lang-card-sub">Französisch · 1000 Wörter</span>
      </div>
      <span class="lang-card-check">✓</span>
    </button>
    <button class="lang-card" id="lang-card-spanish" onclick="selectLang('spanish')">
      <span class="lang-card-flag">🇪🇸</span>
      <div class="lang-card-info">
        <span class="lang-card-name">Español</span>
        <span class="lang-card-sub">Spanisch · 1000 Wörter</span>
      </div>
      <span class="lang-card-check">✓</span>
    </button>
  </div>
</div>

<div class="app">

  <nav class="nav">
    <span class="nav-slider" id="nav-slider" aria-hidden="true"></span>
    <button type="button" id="nav-lessons" class="nav-btn" onclick="show('lessons', this)">Lektionen</button>
    <button type="button" id="nav-flash" class="nav-btn active" onclick="show('flash', this)">Flashcards</button>
    <button type="button" class="nav-btn" onclick="show('sentences', this)">Exercises</button>
  </nav>

  <!-- FARSI 101 COLLAPSIBLE -->
  <div class="farsi101-wrap" id="farsi101-wrap">
    <button class="farsi101-toggle" id="farsi101-toggle" onclick="toggleFarsi101()">
      <span id="farsi101-title">Farsi 101</span>
      <span class="farsi101-arrow" id="farsi101-arrow">▾</span>
    </button>
    <div class="farsi101-sub" id="farsi101-sub">
      <div>
        <button id="subnav-grammar"    class="subnav-btn" onclick="showSub('grammar', this)">Grammar</button>
        <button id="subnav-phrasebook" class="subnav-btn" onclick="showSub('phrases', this)">Phrasebook</button>
        <button id="subnav-vocab"      class="subnav-btn" onclick="showSub('vocab', this)">Vocabulary</button>
        <button id="subnav-alphabet"   class="subnav-btn" onclick="showSub('alphabet', this)">Alphabet</button>
      </div>
    </div>
  </div>

  <!-- DAILY PROGRESS -->
  <div id="daily-progress" class="daily-progress"></div>

  <!-- LESSONS -->
  <div id="lessons" class="screen">
    <div class="section-title">Lektionen</div>
    <div id="lessons-grid" class="lessons-grid"></div>
  </div>

  <!-- FLASHCARDS -->
  <div id="flash" class="screen active">
    <div class="stat-row">
      <div class="stat"><div class="stat-n" id="fc-done">0</div><div class="stat-l">done</div></div>
      <div class="stat"><div class="stat-n" id="fc-correct">0</div><div class="stat-l">correct</div></div>
      <div class="stat"><div class="stat-n" id="fc-left">30</div><div class="stat-l">remaining</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fc-prog" style="width:0%"></div></div>
    <div class="fc-lesson-info-bar">
      <span id="fc-lesson-label"></span>
      <span id="fc-review-badge" class="fc-review-badge" style="display:none">Review</span>
    </div>
    <div class="flip-card" id="flipcard" onclick="flipCard()">
      <div class="flip-inner" id="flipinner">
        <div class="flip-front">
          <div class="fc-direction-badge recognition" id="fc-direction-badge">Erkennung</div>
          <div class="fc-topic-label" id="fc-topic"></div>
          <div class="fc-roman" id="fc-roman"></div>
          <div class="fc-hint" id="fc-hint">Bedeutung zeigen</div>
        </div>
        <div class="flip-back">
          <div class="fc-meaning" id="fc-meaning"></div>
          <div class="fc-note"    id="fc-note"></div>
        </div>
      </div>
    </div>
    <div class="fc-actions" id="fc-actions">
      <button class="btn btn-danger"  onclick="rate(false)">Hard — repeat</button>
      <button class="btn btn-success" onclick="rate(true)">Got it ✓</button>
    </div>
    <div class="done-msg" id="fc-done-msg">
      <div class="done-title">Runde abgeschlossen!</div>
      <div class="done-sub" id="fc-score-msg"></div>
      <button class="btn btn-primary" onclick="restartFlash()">Nochmal</button>
    </div>
  </div>

  <!-- VOCABULARY -->
  <div id="vocab" class="screen">
    <div class="section-title">Dictionary</div>
    <div class="grid3" id="topic-grid"></div>
  </div>

  <!-- GRAMMAR -->
  <div id="grammar" class="screen">
    <div class="section-title">Grammar essentials</div>
    <div id="grammar-content"></div>
  </div>

  <!-- SENTENCES -->
  <div id="sentences" class="screen">
    <div class="section-title">Lückentext-Quiz</div>
    <div id="sentence-content"></div>
  </div>

  <!-- PHRASEBOOK -->
  <div id="phrases" class="screen">
    <div class="section-title">Essential phrasebook</div>
    <div id="phrase-content"></div>
  </div>

  <!-- ALPHABET -->
  <div id="alphabet" class="screen">
    <div class="section-title">Persisch-Arabisches Alphabet</div>
    <div id="alphabet-content"></div>
  </div>

</div>

<!-- Vocab-Modal: außerhalb .app → fixed Overlay über gesamtes Fenster inkl. Header -->
<!-- PWA: Install-Hinweis (Chromium + iOS) -->
<div id="pwa-install-banner" class="pwa-install-banner" hidden role="dialog" aria-modal="true" aria-labelledby="pwa-install-heading">
  <div id="pwa-install-backdrop" class="pwa-install-backdrop" aria-hidden="true"></div>
  <div class="pwa-install-card" onclick="event.stopPropagation()">
    <h2 id="pwa-install-heading" class="pwa-install-title">App installieren</h2>
    <p class="pwa-install-text" id="pwa-install-text"></p>
    <label class="pwa-install-label">
      <input type="checkbox" id="pwa-install-never" />
      Nicht mehr anzeigen
    </label>
    <div class="pwa-install-actions">
      <button type="button" class="btn btn-primary" id="pwa-install-primary" hidden>Installieren</button>
      <button type="button" class="btn" id="pwa-install-dismiss">Schließen</button>
    </div>
  </div>
</div>

<div id="vocab-modal" class="vocab-modal-overlay" onclick="closeVocabModal(event)">
  <div class="vocab-modal" role="dialog" aria-modal="true" aria-labelledby="vocab-modal-title" onclick="event.stopPropagation()">
    <div class="vocab-modal-header">
      <span id="vocab-modal-title"></span>
      <button type="button" class="vocab-modal-close" onclick="closeVocabModal()" aria-label="Schließen">✕</button>
    </div>
    <div class="vocab-modal-body" id="vocab-modal-body"></div>
  </div>
</div>

<script>
  /* Language state — must be defined before all other scripts */
  let currentLang = localStorage.getItem('app_lang') || 'farsi';
  function getActiveVocab()         { return currentLang === 'french' ? FRENCH_VOCAB : currentLang === 'spanish' ? SPANISH_VOCAB : VOCAB; }
  function getActivePhrases()       { return currentLang === 'french' ? FRENCH_PHRASES : currentLang === 'spanish' ? SPANISH_PHRASES : PHRASES; }
  function getActiveSRSKey()        { return currentLang === 'french' ? 'french_srs' : currentLang === 'spanish' ? 'spanish_srs' : 'farsi_srs'; }
  function getActiveLessons()       { return currentLang === 'french' ? FRENCH_LESSONS : currentLang === 'spanish' ? SPANISH_LESSONS : LESSONS; }
  function getActiveLessonStateKey(){ return currentLang === 'french' ? 'french_lesson_state' : currentLang === 'spanish' ? 'spanish_lesson_state' : 'farsi_lesson_state'; }
</script>
<script src="js/french_data.js?v=2"></script>
<script src="js/spanish_data.js?v=2"></script>
<script src="js/data.js?v=2"></script>
<script src="js/lessons.js?v=3"></script>
<script src="js/french_lessons.js?v=1"></script>
<script src="js/spanish_lessons.js?v=1"></script>
<script src="js/srs.js?v=2"></script>
<script src="js/flashcard.js?v=3"></script>
<script src="js/vocab.js?v=2"></script>
<script src="js/grammar.js?v=2"></script>
<script src="js/exercises.js?v=3"></script>
<script src="js/phrases.js?v=2"></script>
<script src="js/alphabet.js?v=2"></script>
<script src="js/streak.js?v=2"></script>
<script src="js/app.js?v=4"></script>
<script src="js/install-prompt.js?v=1"></script>
</body>
</html>
